name: Run All Test Suites

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  BASE_URL: ${{ vars.BASE_URL }}
  DATABASE_FILE: ${{ vars.DATABASE_FILE }}
  ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
  ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
  USER_EMAIL: ${{ secrets.USER_EMAIL }}
  USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
  NEXT_TELEMETRY_DISABLED: 1
  WORKSPACE_CACHE_KEY: monorepo-state-${{ github.sha }}

jobs:
  # 1. CENTRAL BUILD JOB: Installs everything, compiles the app, and freezes the full monorepo state
  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Monorepo Dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      # Cache the entire working directory (including node_modules symlinks and .next build)
      # hashFiles() is valid here inside the step context if you wish to use it, but github.sha is sufficient
      - name: Cache Full Workspace
        uses: actions/cache/save@v4
        with:
          path: |
            .
            !**/node_modules/.cache
          key: ${{ env.WORKSPACE_CACHE_KEY }}

  # 2. UNIT TESTS: Restores state instantly, avoids running npm ci again
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore Workspace State
        uses: actions/cache/restore@v4
        with:
          path: |
            .
            !**/node_modules/.cache
          key: ${{ env.WORKSPACE_CACHE_KEY }}
          fail-on-cache-miss: true

      - name: Run unit tests
        run: npm run test:unit

  # 3. INTEGRATION TESTS: Restores state and boots Playwright WebServer instantly
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore Workspace State
        uses: actions/cache/restore@v4
        with:
          path: |
            .
            !**/node_modules/.cache
          key: ${{ env.WORKSPACE_CACHE_KEY }}
          fail-on-cache-miss: true

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run integration tests
        run: npm run test:integration
        env:
          CI: true

      - name: Upload integration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-report
          path: tests/playwright-report/integration/
          retention-days: 14

  # 4. E2E TESTS: Restores state and runs isolated end-to-end suite
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore Workspace State
        uses: actions/cache/restore@v4
        with:
          path: |
            .
            !**/node_modules/.cache
          key: ${{ env.WORKSPACE_CACHE_KEY }}
          fail-on-cache-miss: true

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload E2E Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            tests/playwright-report/e2e/
            tests/test-results/
          retention-days: 14
