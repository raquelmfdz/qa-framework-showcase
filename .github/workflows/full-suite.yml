name: Full Test Suite

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  run-full-suite:
    uses: ./.github/workflows/ci-smoke-unit.yml
    with:
      test_scope: full
      run_unit: true
      run_integration: true
      run_api: true
      run_e2e: true
      run_a11y: true
      run_load: true
    secrets: inherit
