name: CI Unit + Smoke Suites

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call:
    inputs:
      test_scope:
        description: 'Execution scope'
        required: false
        default: full
        type: string
      run_unit:
        description: 'Run unit tests'
        required: false
        default: true
        type: boolean
      run_integration:
        description: 'Run integration tests'
        required: false
        default: true
        type: boolean
      run_api:
        description: 'Run API tests'
        required: false
        default: true
        type: boolean
      run_e2e:
        description: 'Run E2E tests'
        required: false
        default: true
        type: boolean
      run_a11y:
        description: 'Run accessibility tests'
        required: false
        default: true
        type: boolean
      run_load:
        description: 'Run load tests'
        required: false
        default: true
        type: boolean
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Execution scope'
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - full
      run_unit:
        description: 'Run unit tests'
        required: false
        default: true
        type: boolean
      run_integration:
        description: 'Run integration tests'
        required: false
        default: true
        type: boolean
      run_api:
        description: 'Run API tests'
        required: false
        default: true
        type: boolean
      run_e2e:
        description: 'Run E2E tests'
        required: false
        default: true
        type: boolean
      run_a11y:
        description: 'Run accessibility tests'
        required: false
        default: true
        type: boolean
      run_load:
        description: 'Run load tests'
        required: false
        default: true
        type: boolean

env:
  BASE_URL: ${{ vars.BASE_URL }}
  DATABASE_FILE: ${{ vars.DATABASE_FILE }}
  # Required by NextAuth in CI/prod mode for session encryption/decryption.
  NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
  NEXT_TELEMETRY_DISABLED: 1
  WORKSPACE_CACHE_KEY: monorepo-state-${{ github.sha }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Monorepo Dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  typecheck:
    name: Typecheck (tests workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Monorepo Dependencies
        run: npm ci

      - name: Run tests workspace typecheck
        run: npm run typecheck --workspace=tests

  # 1. CENTRAL BUILD JOB: Installs everything, compiles the app, and freezes the full monorepo state
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Monorepo Dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      # Cache the entire working directory (including node_modules symlinks and .next build)
      # hashFiles() is valid here inside the step context if you wish to use it, but github.sha is sufficient
      - name: Cache Full Workspace
        uses: actions/cache/save@v4
        with:
          path: |
            .
            !**/node_modules/.cache
          key: ${{ env.WORKSPACE_CACHE_KEY }}

  # 2. UNIT TESTS: Restores state instantly, avoids running npm ci again
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [build]
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_unit) ||
      (github.event_name == 'workflow_call' && inputs.run_unit) ||
      (github.event_name != 'workflow_dispatch' && github.event_name != 'workflow_call')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore Workspace State
        uses: actions/cache/restore@v4
        with:
          path: |
            .
            !**/node_modules/.cache
          key: ${{ env.WORKSPACE_CACHE_KEY }}
          fail-on-cache-miss: true

      - name: Prepare summary artifacts directory
        run: mkdir -p artifacts/summary

      - name: Run unit tests
        run: npm run test:unit --workspace=web -- --reporter=json --outputFile=../artifacts/summary/unit.json

      - name: Upload unit summary data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-unit
          path: artifacts/summary/unit.json
          if-no-files-found: warn
          retention-days: 14

  # 3. INTEGRATION TESTS: Restores state and boots Playwright WebServer instantly
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build]
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_integration) ||
      (github.event_name == 'workflow_call' && inputs.run_integration) ||
      (github.event_name != 'workflow_dispatch' && github.event_name != 'workflow_call')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore Workspace State
        uses: actions/cache/restore@v4
        with:
          path: |
            .
            !**/node_modules/.cache
          key: ${{ env.WORKSPACE_CACHE_KEY }}
          fail-on-cache-miss: true

      - name: Prepare summary artifacts directory
        run: mkdir -p artifacts/summary

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run integration tests
        run: |
          if [[ ("${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "workflow_call") && "${{ inputs.test_scope }}" == "full" ]]; then
            npm run test:integration --workspace=tests
          else
            npm run test:integration --workspace=tests -- --grep @smoke
          fi
        env:
          CI: true
          PW_JSON_REPORT_FILE: ../artifacts/summary/integration.json

      - name: Upload integration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-report
          path: tests/playwright-report/integration/
          retention-days: 14

      - name: Upload integration summary data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-integration
          path: artifacts/summary/integration.json
          if-no-files-found: warn
          retention-days: 14

  api:
    name: API Tests
    runs-on: ubuntu-latest
    needs: [build]
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_api) ||
      (github.event_name == 'workflow_call' && inputs.run_api) ||
      (github.event_name != 'workflow_dispatch' && github.event_name != 'workflow_call')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore Workspace State
        uses: actions/cache/restore@v4
        with:
          path: |
            .
            !**/node_modules/.cache
          key: ${{ env.WORKSPACE_CACHE_KEY }}
          fail-on-cache-miss: true

      - name: Prepare summary artifacts directory
        run: mkdir -p artifacts/summary

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run API tests
        run: |
          if [[ ("${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "workflow_call") && "${{ inputs.test_scope }}" == "full" ]]; then
            npm run test:api --workspace=tests
          else
            npm run test:api --workspace=tests -- --grep @smoke
          fi
        env:
          CI: true
          PW_JSON_REPORT_FILE: ../artifacts/summary/api.json

      - name: Upload API report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-report
          path: tests/playwright-report/api/
          retention-days: 14

      - name: Upload API summary data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-api
          path: artifacts/summary/api.json
          if-no-files-found: warn
          retention-days: 14

  # 4. E2E TESTS: Restores state and runs isolated end-to-end suite
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    if: >-
      (github.event_name == 'workflow_dispatch' && (inputs.run_e2e || inputs.run_a11y)) ||
      (github.event_name == 'workflow_call' && (inputs.run_e2e || inputs.run_a11y)) ||
      (github.event_name != 'workflow_dispatch' && github.event_name != 'workflow_call')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore Workspace State
        uses: actions/cache/restore@v4
        with:
          path: |
            .
            !**/node_modules/.cache
          key: ${{ env.WORKSPACE_CACHE_KEY }}
          fail-on-cache-miss: true

      - name: Prepare summary artifacts directory
        run: mkdir -p artifacts/summary

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: |
          if [[ ("${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "workflow_call") && "${{ inputs.test_scope }}" == "full" ]]; then
            npm run test:e2e --workspace=tests
          else
            npm run test:e2e --workspace=tests -- --grep @smoke
          fi
        env:
          CI: true
          PW_JSON_REPORT_FILE: ../artifacts/summary/e2e.json

      - name: Upload E2E Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            tests/playwright-report/e2e/
            tests/test-results/
          retention-days: 14

      - name: Upload E2E auth state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-auth-state
          path: tests/.auth/*.json
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 14

      - name: Upload E2E summary data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-e2e
          path: artifacts/summary/e2e.json
          if-no-files-found: warn
          retention-days: 14

  # 5. A11Y CHANGE DETECTION: determines if UI-related files changed
  a11y-changes:
    name: Detect A11y-Relevant Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call'
    outputs:
      related: ${{ steps.resolve.outputs.related }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            related:
              - 'web/app/**'
              - 'web/components/**'
              - 'web/styles/**'
              - 'web/middleware.ts'
              - 'web/lib/auth.ts'
              - 'web/lib/auth-secret.ts'
              - 'non-functional-tests/a11y/**'

      - id: resolve
        if: always()
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" || "${{ github.event_name }}" == "push" ]]; then
            echo "related=${{ steps.filter.outputs.related }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_call" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.test_scope }}" == "full" ]]; then
              echo "related=true" >> "$GITHUB_OUTPUT"
            else
              echo "related=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  # 6. A11Y TESTS: axe-core accessibility checks on critical pages
  a11y:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    needs: [build, e2e, a11y-changes]
    if: >-
      ((github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') &&
       inputs.run_a11y &&
       inputs.test_scope == 'full') ||
      ((github.event_name == 'push' || github.event_name == 'pull_request') &&
       needs.a11y-changes.outputs.related == 'true')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore Workspace State
        uses: actions/cache/restore@v4
        with:
          path: |
            .
            !**/node_modules/.cache
          key: ${{ env.WORKSPACE_CACHE_KEY }}
          fail-on-cache-miss: true

      - name: Prepare summary artifacts directory
        run: mkdir -p artifacts/summary

      - name: Download auth state from e2e setup
        uses: actions/download-artifact@v4
        with:
          name: e2e-auth-state
          path: tests/.auth

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run a11y tests
        run: |
          if [[ ("${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "workflow_call") && "${{ inputs.test_scope }}" == "full" ]]; then
            npm run test:a11y --workspace=non-functional-tests/a11y
          else
            npm run test:a11y --workspace=non-functional-tests/a11y -- --grep @smoke
          fi
        env:
          CI: true
          PW_JSON_REPORT_FILE: ../../artifacts/summary/a11y.json

      - name: Upload a11y report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-report
          path: non-functional-tests/a11y/axe-reports/html/
          retention-days: 14

      - name: Upload a11y summary data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-a11y
          path: artifacts/summary/a11y.json
          if-no-files-found: warn
          retention-days: 14

  # 7. K6 LOAD TESTS: smoke only in CI; full ramp is a manual/scheduled run
  load:
    name: Load Tests (Smoke)
    runs-on: ubuntu-latest
    needs: [build]
    if: >-
      ((github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') &&
       inputs.run_load &&
       inputs.test_scope == 'full')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore Workspace State
        uses: actions/cache/restore@v4
        with:
          path: |
            .
            !**/node_modules/.cache
          key: ${{ env.WORKSPACE_CACHE_KEY }}
          fail-on-cache-miss: true

      - name: Prepare summary artifacts directory
        run: mkdir -p artifacts/summary

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install k6 -y

      - name: Seed database
        run: npm run seed
        env:
          CI: true

      - name: Start app in background
        run: npm run start &
        env:
          CI: true
          NEXTAUTH_URL: ${{ env.BASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}

      - name: Wait for app to be ready
        run: npx wait-on ${{ env.BASE_URL }} --timeout 60000

      - name: Run k6 load scenario
        run: |
          if [[ ("${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "workflow_call") && "${{ inputs.test_scope }}" == "full" ]]; then
            k6 run --summary-export=artifacts/summary/performance.json --env BASE_URL=${{ env.BASE_URL }} non-functional-tests/load/scenarios/baseline-ramp.js
          else
            k6 run --summary-export=artifacts/summary/performance.json --env BASE_URL=${{ env.BASE_URL }} non-functional-tests/load/scenarios/smoke.js
          fi

      - name: Upload performance summary data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-performance
          path: artifacts/summary/performance.json
          if-no-files-found: warn
          retention-days: 14

  summary:
    name: Publish Test Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [unit, integration, api, e2e, a11y, load]
    env:
      UNIT_JOB_RESULT: ${{ needs.unit.result }}
      INTEGRATION_JOB_RESULT: ${{ needs.integration.result }}
      API_JOB_RESULT: ${{ needs.api.result }}
      E2E_JOB_RESULT: ${{ needs.e2e.result }}
      A11Y_JOB_RESULT: ${{ needs.a11y.result }}
      LOAD_JOB_RESULT: ${{ needs.load.result }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare summary directory
        run: mkdir -p artifacts/summary

      - name: Download E2E summary data
        if: env.E2E_JOB_RESULT != 'skipped'
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: summary-e2e
          path: artifacts/summary
          if-no-artifact-found: ignore

      - name: Download integration summary data
        if: env.INTEGRATION_JOB_RESULT != 'skipped'
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: summary-integration
          path: artifacts/summary
          if-no-artifact-found: ignore

      - name: Download API summary data
        if: env.API_JOB_RESULT != 'skipped'
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: summary-api
          path: artifacts/summary
          if-no-artifact-found: ignore

      - name: Download unit summary data
        if: env.UNIT_JOB_RESULT != 'skipped'
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: summary-unit
          path: artifacts/summary
          if-no-artifact-found: ignore

      - name: Download A11y summary data
        if: env.A11Y_JOB_RESULT != 'skipped'
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: summary-a11y
          path: artifacts/summary
          if-no-artifact-found: ignore

      - name: Download performance summary data
        if: env.LOAD_JOB_RESULT != 'skipped'
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: summary-performance
          path: artifacts/summary
          if-no-artifact-found: ignore

      - name: Generate GitHub job summary
        run: node .github/scripts/generate-ci-summary.mjs
