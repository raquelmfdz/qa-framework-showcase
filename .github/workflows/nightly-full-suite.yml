name: Nightly Full Test Suite

on:
  schedule:
    - cron: '0 2 * * *'

jobs:
  run-full-suite:
    uses: ./.github/workflows/run-tests.yml
    with:
      test_scope: full
      run_unit: true
      run_integration: true
      run_api: true
      run_e2e: true
      run_a11y: true
      run_load: true
    secrets: inherit
