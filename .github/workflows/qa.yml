name: QA Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Unit tests (no server needed, fastest feedback) ──────────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  # ── Integration tests (mocked API, no real DB needed) ────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: tests

      - name: Create .env
        run: |
          echo "BASE_URL=${{ vars.BASE_URL }}" >> tests/.env
          echo "DATABASE_FILE=${{ vars.DATABASE_FILE }}" >> tests/.env
          echo "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}" >> tests/.env
          echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> tests/.env
          echo "USER_EMAIL=${{ secrets.USER_EMAIL }}" >> tests/.env
          echo "USER_PASSWORD=${{ secrets.USER_PASSWORD }}" >> tests/.env

      - name: Run integration tests
        run: npm run test:integration
        env:
          CI: true

      - name: Upload integration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-report
          path: tests/playwright-report/integration/
          retention-days: 14

  # ── E2E tests (full stack: Next.js + real SQLite DB) ─────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: tests

      - name: Create .env
        run: |
          echo "BASE_URL=${{ vars.BASE_URL }}" >> tests/.env
          echo "DATABASE_FILE=${{ vars.DATABASE_FILE }}" >> tests/.env
          echo "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}" >> tests/.env
          echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> tests/.env
          echo "USER_EMAIL=${{ secrets.USER_EMAIL }}" >> tests/.env
          echo "USER_PASSWORD=${{ secrets.USER_PASSWORD }}" >> tests/.env

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: tests/playwright-report/e2e/
          retention-days: 14

      - name: Upload E2E traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-traces
          path: tests/test-results/
          retention-days: 7
