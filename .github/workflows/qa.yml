name: QA Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  BASE_URL: ${{ vars.BASE_URL }}
  DATABASE_FILE: ${{ vars.DATABASE_FILE }}
  ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
  ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
  USER_EMAIL: ${{ secrets.USER_EMAIL }}
  USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  # Single source of truth for the application compilation
  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build Next.js app
        run: npm run build
      # Package the compiled application, source code, and dependencies for downstream jobs
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-build-package
          path: |
            .next
            node_modules
            package.json
            package-lock.json
            tests
          retention-days: 1

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [build] # Waits for the central build job to complete
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: app-build-package
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run unit tests
        run: npm run test:unit

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build] # Waits for the central build job to complete
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: app-build-package
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: tests
      - name: Run integration tests
        run: npm run test:integration
        env:
          CI: true
      - name: Upload integration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-report
          path: tests/playwright-report/integration/
          retention-days: 14

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build] # Enables parallel execution alongside unit and integration jobs
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: app-build-package
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: tests
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: tests/playwright-report/e2e/
          retention-days: 14
      - name: Upload E2E traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-traces
          path: tests/test-results/
          retention-days: 7
