name: QA Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  BASE_URL: ${{ vars.BASE_URL }}
  DATABASE_FILE: ${{ vars.DATABASE_FILE }}
  ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
  ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
  USER_EMAIL: ${{ secrets.USER_EMAIL }}
  USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  # Central job to ensure application compilation and generate production build
  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Monorepo Dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      # Save the production build. Stored in 'web/.next' so 'next start' can locate it later.
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: next-build-package
          path: web/.next
          retention-days: 1

  # Unit tests job running Vitest inside the 'web' workspace
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  # Integration tests job where Playwright mocks the network layer
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Download Next Build
        uses: actions/download-artifact@v4
        with:
          name: next-build-package
          path: web/.next

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run integration tests
        run: npm run test:integration
        env:
          CI: true

      - name: Upload integration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-report
          path: tests/playwright-report/integration/
          retention-days: 14

  # E2E tests job where Playwright interacts with real DB and authentication setup
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Download Next Build
        uses: actions/download-artifact@v4
        with:
          name: next-build-package
          path: web/.next

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: tests/playwright-report/e2e/
          retention-days: 14

      - name: Upload E2E traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-traces
          path: tests/test-results/
          retention-days: 7
