name: QA Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  # These match the seed defaults — not real secrets, committed intentionally.
  # If you add a staging environment with real credentials, move these to
  # GitHub repository secrets and reference them as ${{ secrets.ADMIN_EMAIL }}.
  BASE_URL: http://localhost:3000
  ADMIN_EMAIL: admin@example.com
  ADMIN_PASSWORD: Password1!
  USER_EMAIL: user@example.com
  USER_PASSWORD: Password1!
  DATABASE_FILE: ../web/dev.db
  NODE_VERSION: '20'

jobs:
  # ── Unit tests (no server needed, fastest feedback) ──────────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  # ── Integration tests (mocked API, no real DB needed) ────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: tests

      - name: Copy env file
        run: cp .env.example .env
        working-directory: tests

      - name: Run integration tests
        run: npm run test:integration

      - name: Upload integration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-report
          path: tests/playwright-report/integration/
          retention-days: 14

  # ── E2E tests (full stack: Next.js + real SQLite DB) ─────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [unit] # Only run e2e if unit tests pass — fast fail
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: tests

      - name: Copy env file
        run: cp .env.example .env
        working-directory: tests

      - name: Build Next.js app
        # We run `next build` + `next start` (production mode) in CI rather
        # than `next dev` — faster and closer to real production behaviour.
        # webServer command is overridden via env var to use `npm start`.
        # See playwright.config.ts webServer.command — it calls `npm run dev`
        # which internally does `npm run seed && next dev`. In CI we want:
        #   1. Build the app once
        #   2. Let Playwright's webServer run `npm start` (no watch mode)
        # The seed runs inside global-setup.ts before tests start.
        run: npm run build
        env:
          # Disable Next.js telemetry in CI
          NEXT_TELEMETRY_DISABLED: 1

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          # Override webServer command to use production server in CI
          # (optional — next dev also works, just slower)

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: tests/playwright-report/e2e/
          retention-days: 14

      - name: Upload E2E traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-traces
          path: tests/test-results/
          retention-days: 7
